
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #vis-wrap { padding: 1.5rem 0; font-family: var(--font-sans); }
  #controls { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  button { padding: 8px 18px; font-size: 13px; font-weight: 500; border-radius: var(--border-radius-md); cursor: pointer; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); transition: background 0.15s; }
  button:hover { background: var(--color-background-secondary); }
  button.active { background: #3a1010; color: #F09595; border-color: #993C1D; }
  .ctrl { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-secondary); }
  .ctrl input[type=range] { width: 200px; }
  .ctrl span { min-width: 32px; font-weight: 500; color: var(--color-text-primary); }
  #canvas-wrap { position: relative; border-radius: var(--border-radius-md); overflow: hidden; background: #1a1012; }
  canvas { display: block; width: 100%; height: 600px; }
  #canvas-wrap:-webkit-full-screen { border-radius: 0; width: 100vw; height: 100vh; }
  #canvas-wrap:-webkit-full-screen canvas { width: 100%; height: 100%; }
  #canvas-wrap:fullscreen { border-radius: 0; width: 100vw; height: 100vh; }
  #canvas-wrap:fullscreen canvas { width: 100%; height: 100%; }
  #fs-btn-overlay { position: absolute; bottom: 12px; right: 12px; background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.15); color: #ccc; font-size: 12px; padding: 5px 10px; border-radius: var(--border-radius-md); cursor: pointer; transition: background 0.15s; z-index: 10; }
  #fs-btn-overlay:hover { background: rgba(255,255,255,0.15); }
</style>

<div id="vis-wrap">
  <div id="controls">
    <button id="start-btn">Start microphone</button>
    <div class="ctrl">
      <label for="sens">Sensitivity</label>
      <input type="range" id="sens" min="0.5" max="6" step="0.1" value="1.5">
      <span id="sens-out">1.5×</span>
    </div>
    <div class="ctrl">
      <label for="smooth">Smoothing</label>
      <input type="range" id="smooth" min="0" max="0.95" step="0.05" value="0.90">
      <span id="smooth-out">0.90</span>
    </div>
    <div class="ctrl">
      <label for="bars">Bars</label>
      <input type="range" id="bars" min="16" max="128" step="8" value="96">
      <span id="bars-out">96</span>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="cv"></canvas>
    <button id="fs-btn-overlay">⛶ Fullscreen</button>
  </div>
</div>

<script>
// ─── TUNEABLE CONSTANTS ──────────────────────────────────────────────────────

// Background colour of the canvas (dark warm near-black)
const BG_COLOR = '#1a1012';

// In fullscreen: each half-bar is capped at this ratio of screen height.
// 0.35 = bars reach up to 35% above and below centre. Raise to taste.
const FULLSCREEN_MAX_BAR_RATIO = 0.60;

// FFT size — higher = more frequency resolution, must be a power of 2.
// 4096 gives 2048 frequency bins. Lower (e.g. 2048) is snappier but less detailed.
const FFT_SIZE = 4096;

// Noise floor: frequency bins below this value (0–255) are treated as silence.
// Raise to cut more background noise. 20–40 is subtle, 50+ is aggressive.
const NOISE_FLOOR = 60;

// ─── ELEMENT REFERENCES ─────────────────────────────────────────────────────

const btn       = document.getElementById('start-btn');
const canvas    = document.getElementById('cv');
const ctx2d     = canvas.getContext('2d');
const wrap      = document.getElementById('canvas-wrap');

const sensSlider   = document.getElementById('sens');
const smoothSlider = document.getElementById('smooth');
const barsSlider   = document.getElementById('bars');
const sensOut      = document.getElementById('sens-out');
const smoothOut    = document.getElementById('smooth-out');
const barsOut      = document.getElementById('bars-out');

// ─── SLIDER LABELS ──────────────────────────────────────────────────────────

sensSlider.oninput = () => sensOut.textContent = parseFloat(sensSlider.value).toFixed(1) + '×';

smoothSlider.oninput = () => {
  smoothOut.textContent = parseFloat(smoothSlider.value).toFixed(2);
  if (analyser) analyser.smoothingTimeConstant = parseFloat(smoothSlider.value);
};

barsSlider.oninput = () => barsOut.textContent = barsSlider.value;

// ─── FULLSCREEN ──────────────────────────────────────────────────────────────

function isFullscreen() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

function goFullscreen() {
  if (!isFullscreen()) {
    (wrap.requestFullscreen || wrap.webkitRequestFullscreen).call(wrap);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
}

document.getElementById('fs-btn-overlay').onclick = goFullscreen;

// ─── AUDIO STATE ─────────────────────────────────────────────────────────────

let audioCtx, analyser, source, animId, running = false;

// ─── CANVAS SIZING ───────────────────────────────────────────────────────────

function resizeCanvas() {
  canvas.width  = wrap.offsetWidth;
  canvas.height = isFullscreen() ? wrap.offsetHeight : 600;
}

document.addEventListener('fullscreenchange', resizeCanvas);
document.addEventListener('webkitfullscreenchange', resizeCanvas);
window.addEventListener('resize', resizeCanvas);

// ─── FREQUENCY → NORM ────────────────────────────────────────────────────────

// Given a bar index (0 = bass, higher = treble) and the full FFT data array,
// returns a normalised loudness value 0–1 for that frequency band.
function getBarNorm(barIndex, numBars, dataArray, sensitivity) {
  const binCount = dataArray.length;

  // Logarithmic mapping: bar 0 covers the lowest frequencies,
  // bar numBars-1 covers the highest. Log scale gives more bars to bass/mids.
  // MIN_BIN skips the lowest FFT bins which are sub-bass (inaudible on most
  // speakers/mics). 8–20 is a good range. Raise if centre bars are still quiet.
  const MIN_BIN = 3;
  const tLo = barIndex / numBars;
  const tHi = (barIndex + 1) / numBars;
  const lo  = MIN_BIN + Math.floor((binCount - MIN_BIN) * (Math.pow(binCount, tLo) - 1) / (binCount - 1));
  const hi  = MIN_BIN + Math.ceil((binCount - MIN_BIN)  * (Math.pow(binCount, tHi) - 1) / (binCount - 1));

  let sum = 0, count = 0;
  for (let b = lo; b <= Math.min(hi, binCount - 1); b++) {
    sum += dataArray[b];
    count++;
  }
  const avg = count ? sum / count : 0;

  // Subtract noise floor, rescale remaining range to 0–1, apply sensitivity
  const signal = Math.max(0, avg - NOISE_FLOOR) / (255 - NOISE_FLOOR);
  return Math.min(signal * sensitivity, 1);
}

// ─── DRAW A SINGLE BAR ───────────────────────────────────────────────────────

// Draws one vertical bar (growing up and down from baseline) at pixel position x.
function drawBar(x, barW, baseline, maxBarH, norm) {
  const halfH = Math.max(2, norm * maxBarH);
  const yTop  = baseline - halfH;

  // Gradient: bright tips fading to a dark root at the centre line
  const grad = ctx2d.createLinearGradient(0, yTop, 0, baseline + halfH);
  grad.addColorStop(0,   `rgba(240, 90, 70, ${0.5 + norm * 0.5})`); // bright top tip
  grad.addColorStop(0.5, `rgba(100, 15, 15, 0.8)`);                 // dark centre root
  grad.addColorStop(1,   `rgba(240, 90, 70, ${0.5 + norm * 0.5})`); // bright bottom tip
  ctx2d.fillStyle = grad;

  const radius = Math.min(3, barW / 2);

  // Upper half
  ctx2d.beginPath();
  ctx2d.roundRect(x, yTop, barW, halfH, radius);
  ctx2d.fill();

  // Lower half (mirrored below baseline)
  ctx2d.beginPath();
  ctx2d.roundRect(x, baseline, barW, halfH, radius);
  ctx2d.fill();

  // Peak caps — bright thin strip at each tip
  if (norm > 0.05) {
    const capH = Math.min(3, halfH);
    ctx2d.fillStyle = `rgba(255, 140, 120, ${norm * 0.7})`;
    ctx2d.beginPath();
    ctx2d.roundRect(x, yTop, barW, capH, radius);
    ctx2d.fill();
    ctx2d.beginPath();
    ctx2d.roundRect(x, baseline + halfH - capH, barW, capH, radius);
    ctx2d.fill();
  }
}

// ─── DRAWING ─────────────────────────────────────────────────────────────────

function drawBars(dataArray) {
  resizeCanvas();
  const w = canvas.width;
  const h = canvas.height;

  ctx2d.fillStyle = BG_COLOR;
  ctx2d.fillRect(0, 0, w, h);

  const numBars     = dataArray ? parseInt(barsSlider.value) : 64;
  const sensitivity = parseFloat(sensSlider.value);
  const gap         = numBars > 80 ? 2 : 3;
  const barW        = Math.max(1, (w - gap * (numBars - 1)) / numBars);
  const maxBarH     = isFullscreen() ? h * FULLSCREEN_MAX_BAR_RATIO / 1.75 : (h - 12) / 2;
  const baseline    = isFullscreen() ? h * 0.5 : h * 0.5;

  // ── Centred spectrum layout ──────────────────────────────────────────────
  // Bar 0 (bass) sits in the horizontal centre of the canvas.
  // Bars are then placed in pairs: one stepping left, one stepping right.
  // This means the left half mirrors the right half, both going bass→treble outward.
  //
  // With an even numBars, the centre two bars share the middle.
  // The total number of unique frequency bands drawn is still numBars.

  const half = Math.floor(numBars / 2);  // number of bars on each side
  const centreX = w / 2;                 // horizontal centre of canvas

  for (let i = 0; i < half; i++) {
    const norm = dataArray ? getBarNorm(i, half, dataArray, sensitivity) : 0;

    // Right side: bar i steps rightward from centre
    const xRight = centreX + i * (barW + gap) + gap / 2;
    drawBar(xRight, barW, baseline, maxBarH, norm);

    // Left side: bar i steps leftward from centre (mirror)
    const xLeft = centreX - (i + 1) * (barW + gap) + gap / 2;
    drawBar(xLeft, barW, baseline, maxBarH, norm);
  }
}

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────

function loop() {
  if (!running) return;
  const dataArray = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(dataArray);
  drawBars(dataArray);
  animId = requestAnimationFrame(loop);
}

// ─── START / STOP ────────────────────────────────────────────────────────────

async function start() {
  if (running) {
    running = false;
    cancelAnimationFrame(animId);
    if (source) source.disconnect();
    if (audioCtx) audioCtx.close();
    btn.textContent = 'Start microphone';
    btn.classList.remove('active');
    drawBars(null);
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = parseFloat(smoothSlider.value);
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    running = true;
    btn.textContent = 'Stop microphone';
    btn.classList.add('active');
    loop();
  } catch(e) {}
}

btn.onclick = start;
drawBars(null);
</script>
